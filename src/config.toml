storage_root = "Photos"
icc = "/Path/To/ProPhotoRGB.icc"
color_space = 4
memory_limit = "16G"

[[outputs]]
subdir = "JPEG/sRGB"
format = "jpeg"
quality = 90
icc = "/Path/To/sRGB.icc"

[[outputs]]
subdir = "JPEG/AdobeRGB"
format = "jpeg"
quality = 95
icc = "/Path/To/AdobeRGB1998.icc"

[[outputs]]
subdir = "PNG/AdobeRGB"
format = "png"
bit_depth = 16
icc = "/Path/To/AdobeRGB1998.icc"

[metadata]
copy_exif = true
